# Live protocol-drift gate. Run manually when bumping the pinned claude
# binary (e.g. before a nix-config claude-code update): it executes one real
# haiku turn through the full supervisor stack and fails if the CLI emits
# events this build's parser does not recognize.
#
# Requirements (deliberately not provisioned by default):
#   - Repository secret CLAUDE_CODE_OAUTH_TOKEN: a subscription setup-token
#     (`claude setup-token`). Spends real tokens (~$0.01/run on haiku).
name: Live smoke

on:
  workflow_dispatch:
    inputs:
      claude-version:
        description: "@anthropic-ai/claude-code version to test against"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install claude
        env:
          CLAUDE_VERSION: ${{ inputs.claude-version }}
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_VERSION}"
      - name: Run live smoke test
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not configured" && exit 1
          fi
          MENTAT_CLAUDE_BIN="$(command -v claude)" \
            go test -race -run TestClaudeCodeLiveSmoke -v ./internal/backend/
