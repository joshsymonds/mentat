name: Live smoke

# Manual only: spends real tokens (about a cent at haiku). Run when bumping
# the pinned SDK version or the claude binary. Needs a CLAUDE_CODE_OAUTH_TOKEN
# repository secret (claude setup-token).
on:
  workflow_dispatch:
    inputs:
      claude-version:
        description: '@anthropic-ai/claude-code version to test against'
        required: false
        default: 'latest'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Check secret is configured
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not configured (claude setup-token)"
            exit 1
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - run: npm ci
      - run: npm install -g @anthropic-ai/claude-code@${{ inputs.claude-version || 'latest' }}
      - run: MENTAT_CLAUDE_BIN="$(command -v claude)" npx vitest run test/live.test.ts
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
